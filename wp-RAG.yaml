services:
  # ============ VECTOR DATABASE ============
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rag_network

  # ============ LOCAL LLM RUNNERS ============
  # Primary: Ollama (recommended for local development)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rag_network

  # Alternative: vLLM (for higher throughput if needed)
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    command: --model Qwen2.5-7B-Instruct --tensor-parallel-size 1
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - VLLM_API_KEY=${VLLM_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - rag_network
    profiles:
      - vllm  # Only start with: docker-compose --profile vllm up

  # ============ DOCUMENT PROCESSING PIPELINE ============
  doc-processor:
    build:
      context: ./services/doc-processor
      dockerfile: Dockerfile
    container_name: doc-processor
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - UPLOAD_FOLDER=/tmp/uploads
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-52428800}  # 50MB default
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - doc_uploads:/tmp/uploads
      - ./services/doc-processor:/app
    depends_on:
      - chunk-service
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ CHUNKING & EMBEDDING PIPELINE ============
  chunk-service:
    build:
      context: ./services/chunk-service
      dockerfile: Dockerfile
    container_name: chunk-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-wp_ai_receptionist}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./services/chunk-service:/app
    depends_on:
      - ollama
      - qdrant
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ EMBEDDING SERVICE ============
  embedding-service:
    build:
      context: ./services/embedding-service
      dockerfile: Dockerfile
    container_name: embedding-service
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-wp_ai_receptionist}
      - BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-32}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./services/embedding-service:/app
    depends_on:
      - ollama
      - qdrant
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ RAG SERVICE (QUERY ENGINE) ============
  rag-service:
    build:
      context: ./services/rag-service
      dockerfile: Dockerfile
    container_name: rag-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      - PROVIDER=${PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHAT_MODEL=${CHAT_MODEL:-neural-chat:7b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-wp_ai_receptionist}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - PORT=4002
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.7}
      - MAX_CONTEXT_CHUNKS=${MAX_CONTEXT_CHUNKS:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./services/rag-service:/app
    depends_on:
      - qdrant
      - ollama
      - embedding-service
      - chunk-service
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ OPTIONAL: API GATEWAY/ORCHESTRATOR ============
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - DOC_PROCESSOR_URL=http://doc-processor:4001
      - CHUNK_SERVICE_URL=http://chunk-service:4003
      - EMBEDDING_SERVICE_URL=http://embedding-service:4004
      - RAG_SERVICE_URL=http://rag-service:4002
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./services/api-gateway:/app
    depends_on:
      - doc-processor
      - chunk-service
      - embedding-service
      - rag-service
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_storage:
  ollama_data:
  doc_uploads:

networks:
  rag_network:
    driver: bridge